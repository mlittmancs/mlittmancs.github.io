<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYT "Artificial Intelligence" References (1950–2026)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #fdf6e3;
      color: #222;
      padding: 2rem;
    }
    h1 {
      font-size: 1.6rem;
      margin-bottom: 0.3rem;
      line-height: 1.3;
    }
    p.subtitle {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 1.5rem;
    }
    .chart-container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 1.5rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.07);
    }
    canvas { display: block; }
    p.note {
      font-size: 0.8rem;
      color: #888;
      margin-top: 1rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="chart-container">
    <h1>New York Times References to "Artificial Intelligence"</h1>
    <p class="subtitle">Number of articles per year, 1950–2026</p>
    <canvas id="chart" height="120"></canvas>
    <p class="note">
      Source: <a href="https://www.nytimes.com/search" target="_blank">NYT Article Search</a>
      &mdash; query: <em>"artificial intelligence"</em>
    </p>
  </div>

  <script>
    const counts = {"1950":0,"1951":0,"1952":0,"1953":0,"1954":0,"1955":0,"1956":0,"1957":0,"1958":0,"1959":0,"1960":0,"1961":0,"1962":0,"1963":1,"1964":1,"1965":0,"1966":0,"1967":3,"1968":2,"1969":1,"1970":2,"1971":2,"1972":0,"1973":1,"1974":0,"1975":3,"1976":1,"1977":6,"1978":2,"1979":5,"1980":6,"1981":29,"1982":21,"1983":43,"1984":56,"1985":86,"1986":93,"1987":69,"1988":72,"1989":54,"1990":55,"1991":56,"1992":43,"1993":25,"1994":26,"1995":33,"1996":33,"1997":47,"1998":49,"1999":54,"2000":67,"2001":95,"2002":92,"2003":81,"2004":90,"2005":53,"2006":95,"2007":66,"2008":84,"2009":61,"2010":81,"2011":98,"2012":98,"2013":109,"2014":127,"2015":179,"2016":325,"2017":461,"2018":635,"2019":665,"2020":417,"2021":417,"2022":422,"2023":1527,"2024":1732,"2025":2362,"2026":1111};

    const labels = Object.keys(counts).map(Number).sort((a, b) => a - b);
    const data   = labels.map(y => counts[y] ?? 0);

    new Chart(document.getElementById('chart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Articles mentioning "artificial intelligence"',
          data,
          backgroundColor: 'rgba(50, 100, 180, 0.75)',
          borderColor:     'rgba(50, 100, 180, 1)',
          borderWidth: 1,
          borderRadius: 2,
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: ctx => `Year: ${ctx[0].label}`,
              label: ctx => `${ctx.raw.toLocaleString()} article${ctx.raw !== 1 ? 's' : ''}`,
            }
          }
        },
        scales: {
          x: {
            ticks: {
              maxRotation: 45,
              callback: (val, i) => {
                const year = labels[i];
                return year % 5 === 0 ? year : '';
              }
            },
            grid: { display: false }
          },
          y: {
            beginAtZero: true,
            title: { display: true, text: 'Number of Articles' },
          }
        }
      }
    });
  </script>
</body>
</html>
