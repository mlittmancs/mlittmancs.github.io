<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wooly Face - Magnetic-Style Drawing Toy</title>
    <link rel="stylesheet" href="styles/wooly-willy.css">
</head>
<body>
    <div id="page">
        <h1>Wooly Face</h1>
        <p class="subtitle">
            Inspired by the classic
            <a href="https://www.fatbraintoys.com/toy_companies/playmonster/original_wooly_willy_magnetic_personality.cfm" target="_blank" rel="noopener">Wooly Willy</a>
            magnetic drawing toy. Draw hair, a mustache, a beard&mdash;anything&mdash;on the blank face below.
        </p>

        <div class="toolbar">
            <div class="tool-group">
                <span class="tool-label">Pen thickness</span>
                <div class="presets" id="preset-buttons">
                    <button type="button" class="preset-btn" data-size="2">Fine</button>
                    <button type="button" class="preset-btn" data-size="5">Medium</button>
                    <button type="button" class="preset-btn active" data-size="10">Thick</button>
                    <button type="button" class="preset-btn" data-size="18">Bold</button>
                </div>
                <input type="range" id="thickness" min="1" max="24" value="10">
                <span id="thickness-value">10px</span>
            </div>

            <div class="tool-group">
                <button type="button" id="clear-btn">Clear Drawing</button>
            </div>
        </div>

        <div class="canvas-wrapper" id="canvas-wrapper">
            <canvas id="face-canvas" width="500" height="620"></canvas>
            <canvas id="draw-canvas" width="500" height="620"></canvas>
            <canvas id="pending-canvas" width="500" height="620"></canvas>
        </div>

        <p class="back-link"><a href="index.html">&larr; Back to home</a></p>
    </div>

    <script src="scripts/wooly-willy.js"></script>
</body>
</html>
